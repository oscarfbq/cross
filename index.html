<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Botas Industriales Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo" id="brandLogo">Cross-X </div>
        <nav class="nav-links">
            <a href="#">Catálogo</a>
            <a href="#">Tecnología</a>
            <a href="#">Distribuidores</a>
        </nav>
        <button class="btn-order">Comprar Ahora</button>
    </header>

    <main class="hero-section">
        <div class="background-text-container" id="textContainer">
            <div class="background-text text-active" id="bgTextCurrent">TITÁN</div>
        </div>

        <div class="showcase-area">
            <div class="pedestal"></div>
            
            <div class="boot-container" id="bootContainer">
                </div>
        </div>

        <div class="floating-card specs-card">
            <h2>Nº 1</h2>
            <p style="font-weight: bold; font-size: 1.1rem;" id="featureText">Puntera de Acero</p>
            <p>Suela Antiderrapante<br>Dieléctrica</p>
        </div>

        <div class="floating-card trust-score">
            <h3>4.8/5</h3>
            <p>Resistencia extrema<br>aprobada por expertos</p>
        </div>

        <div class="floating-card video-card">
            <button class="play-btn">▶</button>
            <div>
                <p style="font-weight: bold; font-size: 0.9rem; margin-bottom: 0.2rem;">Ver en acción</p>
                <p style="font-size: 0.75rem; opacity: 0.7;">Prueba de impacto y compresión</p>
            </div>
        </div>

        <div class="slider-controls">
            <button id="btnPrev">← Anterior</button>
            <span class="indicators" id="indicators">- - -</span>
            <button id="btnNext">Siguiente →</button>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
